name: novident_editor_document
version: 1.0.1
description: >-
  Core document model for Novident Editor — tree nodes, rich-text delta,
  paths, and attributes. Reusable independently of the full editor.
homepage: https://github.com/Novident/
repository: https://github.com/Novident/novident-editor/
issue_tracker: https://github.com/Novident/novident-editor/issues

environment:
  sdk: ">=3.4.3 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  collection: ^1.16.0
  diff_match_patch: ^0.4.1
  flutter:
    sdk: flutter
  nanoid: ^1.0.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
