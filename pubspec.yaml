name: "novident_editor"
version: 1.0.1
homepage: https://github.com/Novident/
repository: https://github.com/Novident/novident-editor/
documentation: https://github.com/Novident/novident-editor/
issue_tracker: https://github.com/Novident/novident-editor/issues

environment:
  sdk: ">=3.4.3 <4.0.0"
  flutter: ">=3.32.0"

description: A highly customizable rich-text editor for Flutter, part of the
  Novident suite. Fork of AppFlowy Editor (AppFlowy-IO), used under the
  Mozilla Public License 2.0.

dependencies:
  flutter:
    sdk: flutter
  collection: ^1.18.0
  device_info_plus: ^13.2.0
  diff_match_patch: ^0.4.1
  novident_editor_document: ^1.0.1
  file_picker: ^12.0.0-beta.7
  flutter_svg: ^2.0.6
  html: ^0.15.5
  http: ^1.2.0
  intl: ^0.20.2
  keyboard_height_plugin: ^0.3.0
  logging: ^1.2.0
  markdown: ^7.2.1
  nanoid: ^1.0.0
  numerus: ^2.1.2
  provider: ^6.0.5
  scroll_to_index: ^3.0.1
  string_validator: ^1.0.0
  universal_html: ^2.2.4
  universal_platform: ^1.1.0
  url_launcher: ^6.1.11

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_localizations:
    sdk: flutter
  flutter_test:
    sdk: flutter
  intl_utils: ^2.8.2
  mockito: ^5.4.1
  network_image_mock: ^2.1.1
  path_provider: ^2.0.5
  pubspec_dependency_sorter: ^1.0.5

topics:
  - widgets
  - editor
  - novident

flutter:
  assets:
    - "assets/images/toolbar/"
    - "assets/images/selection_menu/"
    - "assets/images/image_toolbar/"
    - "assets/images/"
    - "assets/mobile/toolbar_icons/"

flutter_intl:
  enabled: true
  class_name: NovidentEditorLocalizations
  main_locale: en
  arb_dir: lib/l10n
  output_dir: lib/src/l10n
  use_deferred_loading: false
